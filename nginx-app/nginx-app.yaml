
apiVersion: v1
kind: Namespace
metadata:
  name: amir-ns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amir-sa
  namespace: amir-ns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amir-config
  namespace: amir-ns
data:
  APP_NAME: amir
  APP_ENV: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amir
  namespace: amir-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amir
  template:
    metadata:
      labels:
        app: amir
    spec:
      serviceAccountName: amir-sa
      containers:
        - name: amir
          image: nginx:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: amir-config
            - secretRef:
                name: amir-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: amir-svc
  namespace: amir-ns
spec:
  selector:
    app: amir
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: amir-allow-svc-port
  namespace: amir-ns
spec:
  podSelector:
    matchLabels:
      app: amir
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
